<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hey You 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
     font-family: 'Special Elite', cursive;
    background: linear-gradient(135deg, #ffe4ec, #fbeaff);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Glass card */
.container {
    position: relative;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 500px;
    width: 90%;
}

/* Headings */
h1 {
     font-family: 'Special Elite', cursive;
    font-size: 36px;
    color: #a8434f;
    margin-bottom: 20px;
}

h2 {
    font-size: 24px;
    color: #5a3d46;
    margin-bottom: 30px;
    line-height: 1.4;
}

p {
    font-size: 18px;
    margin: 10px 0 20px;
}

/* Button area */
.button-area {
    position: relative;
    height: 120px;
    margin-top: 20px;
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.3s ease;
}

.yes {
    background: #ff6b81;
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,129,0.4);
    position: absolute;
    left: 25%;
    top: 30px;
}

.yes:hover {
    transform: scale(1.1);
}

.no {
    background: #ddd;
    color: #444;
    position: absolute;
    left: 55%;
    top: 30px;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff6b81;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
    pointer-events: none;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container" id="mainBox">
    <h1>Good morning, Mr Hatton-Jones</h1>
    <h2>Would you like to accompany me to Irene Dairy Farm for an afternoon of ice cream &amp; looking at baby cows? 💖</h2>

    <div class="button-area" id="buttonArea">
        <button class="yes" onclick="yesClicked()">Yes</button>
        <button class="no" id="noBtn" onmouseover="moveButton()">No</button>
    </div>
</div>

<script>
function yesClicked() {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
             font-family: 'Special Elite', cursive;
            background: linear-gradient(135deg, #ffe4ec, #fbeaff);
            text-align:center;
        ">
            <h1 style="color:#a8434f; font-size:42px;">YAY :)</h1>
            <p style="font-size:20px;">Can't wait! 💌</p>
        </div>
    `;
}

function moveButton() {
    const button = document.getElementById("noBtn");
    const area = document.getElementById("buttonArea");

    const areaWidth = area.clientWidth;
    const areaHeight = area.clientHeight;
    const buttonWidth = button.offsetWidth;
    const buttonHeight = button.offsetHeight;

    const maxX = areaWidth - buttonWidth;
    const maxY = areaHeight - buttonHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    button.style.left = x + "px";
    button.style.top = y + "px";
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
