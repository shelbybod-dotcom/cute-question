<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hey You 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #fbeaff);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Glass card */
.container {
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 400px;
}

/* Headings */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: #a8434f;
}

p {
    font-size: 18px;
    margin: 10px 0 20px;
}

/* Buttons */
button {
    padding: 12px 22px;
    margin: 10px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: 0.3s ease;
}

.yes {
    background: #ff6b81;
    color: white;
    box-shadow: 0 4px 15px rgba(255,107,129,0.4);
}

.yes:hover {
    transform: scale(1.1);
}

.no {
    background: #ddd;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: #ff6b81;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh);
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container" id="mainBox">
    <h1>Good morning, Mr Hatton-Jones</h1>
    <h2>Would you like to accompany me to Irene Diary Farm for an afternoon of ice cream & looking at baby cows? 💖</h2>

    <button class="yes" onclick="yesClicked()">Yes </button>
    <button class="no" onmouseover="moveButton(this)">No </button>
</div>

<script>
// YES CLICK
function yesClicked() {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            font-family:'Playfair Display', serif;
            background: linear-gradient(135deg, #ffe4ec, #fbeaff);
            text-align:center;
        ">
            <h1 style="color:#a8434f; font-size:42px;">YAY :)</h1>
            <p style="font-size:20px;">Can't wait! 💌</p>
        </div>
    `;
}

// RUNAWAY BUTTON
function moveButton(button) {
    button.style.position = "absolute";
    button.style.top = Math.random() * window.innerHeight + "px";
    button.style.left = Math.random() * window.innerWidth + "px";
}

// HEARTS
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
